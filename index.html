<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Recipe Card</title>
    <link rel="stylesheet" href="style.CSS">
</head>
<body>

<div class="card">
    <h1>🍫 Chocolate Cake</h1>

    <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=600"
         alt="Chocolate Cake">

    <p><strong>Preparation Time:</strong> 45 Minutes</p>
    <p><strong>Serves:</strong> 4 People</p>

    <button onclick="toggleIngredients()">Show Ingredients</button>

    <div id="ingredients" class="hidden">
        <h3>Ingredients</h3>
        <ul>
            <li>2 Cups Flour</li>
            <li>1 Cup Sugar</li>
            <li>½ Cup Cocoa Powder</li>
            <li>2 Eggs</li>
            <li>1 Cup Milk</li>
        </ul>
    </div>

    <h3>Instructions</h3>
    <ol id="steps">
        <li>Mix all ingredients.</li>
        <li>Pour into baking tray.</li>
        <li>Bake for 30 minutes.</li>
        <li>Cool and serve.</li>
    </ol>

    <button onclick="startCooking()">Start Cooking</button>
    <button onclick="nextStep()">Next Step</button>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <h3>Timer: <span id="timer">45</span> min</h3>
</div>

<script src="image.js"></script>

</body>
</html>
